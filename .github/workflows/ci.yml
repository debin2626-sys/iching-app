name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      NEXTAUTH_SECRET: "ci-build-secret-placeholder-32chars!!"
      NEXTAUTH_URL: "https://51yijing.com"
      OPENAI_API_KEY: "sk-000000000000000000000000000000000000000000000000"
      DEEPSEEK_API_KEY: "sk-000000000000000000000000000000000000000000000000"
      STRIPE_SECRET_KEY: "sk_test_placeholder000000000000000000000000000000"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      RESEND_API_KEY: "re_placeholder"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"
      GOOGLE_CLIENT_ID: "placeholder.apps.googleusercontent.com"
      GOOGLE_CLIENT_SECRET: "placeholder"
      NEXT_PUBLIC_GA_ID: "G-PLACEHOLDER"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
